<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- 文字コード設定 -->
    <meta charset="UTF-8">

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- タブタイトル -->
    <title>GOURMET GUIDE</title>

    <!-- CSSファイル読み込み -->
    <link rel="stylesheet" href="facility.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- =========================
         メインビジュアル
    ========================== -->
    <section class="hero">

        <!-- 暗めオーバーレイ -->
        <div class="overlay">

            <!-- メインタイトル -->
            <h1>FACILITY GUIDE</h1>

            <!-- サブタイトル -->
            <p>
                全力で遊べる<br>
                楽しいお店を見つけよう
            </p>

        </div>

    </section>

    <!-- =========================
         店舗一覧セクション
    ========================== -->
    <section class="shops">

        <!-- セクションタイトル -->
        <h2>POPULAR SHOPS</h2>

        <!-- 店舗カード全体 -->
        <div class="shop-container">

            <!-- =========================
                 店舗1 高崎レジャーランド
            ========================== -->
            <a href="shousai\takasaki-leisure\takasaki-leisure.html" class="shop-link">

                <!-- 店舗カード -->
                <div class="shop-card">

                    <!-- 店舗画像 -->
                    <img src="images/shop1.jpg" alt="高崎レジャーランド">

                    <!-- テキスト部分 -->
                    <div class="shop-text">

                        <!-- 店舗名 -->
                        <h3>高崎レジャーランド</h3>

                        <!-- 店舗説明 -->
                        <p>
                            24時間営業のレジャーランドで、
                            クレーンゲームや卓球など
                            様々な遊びが楽しめる施設となっております。
                        </p>

                    </div>

                </div>

            </a>

            <!-- =========================
                 店舗2 OPA
            ========================== -->
            <a href="shousai/OPA/OPA.html" class="shop-link">

                <!-- 店舗カード -->
                <div class="shop-card">

                    <!-- 店舗画像 -->
                    <img src="images/shop1.jpg" alt="高崎レジャーランド">

                    <!-- テキスト部分 -->
                    <div class="shop-text">

                        <!-- 店舗名 -->
                        <h3>高崎オーパ</h3>

                        <!-- 店舗説明 -->
                        <p>
                            高崎駅から徒歩五分で、
                            様々なお店の揃ったショッピングモールです。
                        </p>

                    </div>

                </div>

            </a>
            <!-- =========================
                 店舗3 ITALIAN KITCHEN
            ========================== -->
            <div class="shop-card">

                <!-- 店舗画像 -->
                <img src="images/shop3.jpg" alt="ITALIAN KITCHEN">

                <!-- テキスト部分 -->
                <div class="shop-text">

                    <!-- 店舗名 -->
                    <h3>ITALIAN KITCHEN</h3>

                    <!-- 店舗説明 -->
                    <p>
                        本格パスタが人気の
                        イタリアンレストラン。
                    </p>

                </div>

            </div>

            <!-- =========================
                 店舗4 JAPANESE DINING
            ========================== -->
            <div class="shop-card">

                <!-- 店舗画像 -->
                <img src="images/shop4.jpg" alt="JAPANESE DINING">

                <!-- テキスト部分 -->
                <div class="shop-text">

                    <!-- 店舗名 -->
                    <h3>JAPANESE DINING</h3>

                    <!-- 店舗説明 -->
                    <p>
                        和モダン空間で
                        本格和食を楽しめるお店。
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- =========================
         フッター
    ========================== -->
    <footer>

        <p>© 2026 GOURMET GUIDE</p>

    </footer>

</body>
</html>
