<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOURMET GUIDE</title>
    <link rel="stylesheet" href="facility.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- メニュー -->
    <header class="page-header">

    <nav id="nav-menu">
            <ul>
                <li><a href="../facility/facility.html">施設</a></li>
                <li><a href="../cafe/cafe.html">カフェ</a></li>
                <li><a href="../food/food.html">飲食店</a></li>
            </ul>
        </nav>

        <!-- ハンバーガーボタン（スマホのみ表示） -->
        <button class="hamburger" id="hamburger-btn" aria-label="メニューを開く">
            <span></span>
            <span></span>
            <span></span>
        </button>
    
        <!-- 戻るボタン -->
        <a href="../index.html" class="back-button">
        ❮ 
        </a>
    </header>

    <section class="hero">
        <div class="overlay">
            
            <h1>FACILITY GUIDE</h1>
            <p>
                全力で遊べる<br>
                楽しいお店を見つけよう
            </p>
        </div>
    </section>

    <section class="shops">
        <h2>POPULAR SHOPS</h2>
        <div class="shop-container">

            <a href="shousai/mitei/mitei.html" class="shop-link">
                <div class="shop-card">
                    <img src="images/shop1.jpg" alt="未定">
                    <div class="shop-text">
                        <h3>未定</h3>
                        <p>
                            未定
                        </p>
                    </div>
                </div>
            </a>


        </div>
    </section>

    <footer>
        <p>© 2026 GOURMET GUIDE</p>
    </footer>

    <!-- TOPに戻るボタン -->
    <a href="#" class="top-btn">↑</a>

    <!-- HOMEに戻るボタン -->
    <a href="../index.html" class="home-btn">🏠</a>

    <script>
        // メニューバー　ハンバーガー　
        const btn = document.getElementById('hamburger-btn');
        const nav = document.getElementById('nav-menu');

        btn.addEventListener('click', () => {
            const isOpen = nav.classList.toggle('open');
            btn.classList.toggle('active', isOpen);
            btn.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
        });

        // メニュー内のリンクをタップしたら閉じる
        nav.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('open');
                btn.classList.remove('active');
            });
        });
    </script>
</body>
</html>
