<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高崎レジャーランド</title>

    <link rel="stylesheet" href="../facility-shousai.css">
</head>
<header class="page-header">

    <!-- ナビ -->
    <nav id="nav-menu">
        <ul>
            <li><a href="../../../facility/facility.html">施設</a></li>
            <li><a href="../../../cafe/cafe.html">カフェ</a></li>
            <li><a href="../../../food/food.html">飲食店</a></li>
        </ul>
    </nav>

    <!-- ハンバーガー -->
    <button class="hamburger" id="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- 戻るボタン -->
    <a href="javascript:history.back();" class="back-button">
    ❮ 
    </a>
</header>
<body>

    <!-- タイトル -->
    <div class="overlay">
        <h1>
            高崎レジャーランド
        </h1>

    </div>

    <!-- 詳細 -->
    <section class="detail">

        <div class="content">

            <!-- 左側 -->
            <div class="left-area">

                <!-- スライダー -->
                <div class="slider">

                    <div class="slides"></div>

                    <button class="prev">❮</button>
                    <button class="next">❯</button>

                </div>

                <!-- 一覧ボタン -->
                <a href="#" class="gallery-btn">
                    一覧で見る
                </a>

                <!-- 一覧表示 -->
                <div class="gallery"></div>

            </div>

            <!-- テキスト -->
            <div class="text">

                <h2>施設紹介</h2>

                <p>
                    取材内容を書く
                </p>

                <h3>営業時間</h3>

                <p>
                    24時間営業
                </p>

                <h3>住所</h3>
                
                <p>〒370-0046</p>
                <p>群馬県高崎市江木町３３３−１ 高崎ＥＸビル2階</p>

                <h3>電話番号</h3>

                <p>
                    027-330-3002
                </p>

            </div>

        </div>

    </section>

    <!-- TOPに戻る -->
    <a href="#" class="top-btn">↑</a>

    <!-- HOMEに戻る -->
    <a href="../../../index.html" class="home-btn">🏠</a>

    <!-- 拡大表示 -->
    <div class="lightbox">

        <!-- 閉じる -->
        <span class="close">×</span>

        <!-- 左右ボタン -->
        <button class="lightbox-prev">❮</button>

        <img class="lightbox-img" src="" alt="">

        <button class="lightbox-next">❯</button>

    </div>

    <!-- JavaScript -->
    <script>
        // =========================
        // 画像設定
        // =========================

        const imageCount = 25;
        const imageFolder = "img/cafe";

        // =========================
        // 画像リスト作成
        // =========================

        const allImages = [];

        for(let i = 1; i <= imageCount; i++){
            allImages.push(`${imageFolder}${i}.jpg`);
        }

        // スライダー・ギャラリー生成

        const slidesContainer = document.querySelector(".slides");
        const galleryContainer = document.querySelector(".gallery");

        // 最後の画像を先頭へ複製
        const firstClone = document.createElement("img");
        firstClone.src = allImages[allImages.length - 1];
        firstClone.className = "slide";
        slidesContainer.appendChild(firstClone);

        // 本物画像
        allImages.forEach(src => {

            const slideImg = document.createElement("img");
            slideImg.src = src;
            slideImg.className = "slide";
            slidesContainer.appendChild(slideImg);

            const galleryImg = document.createElement("img");
            galleryImg.src = src;
            galleryImg.className = "gallery-img";
            galleryContainer.appendChild(galleryImg);
        });

        // 最初の画像を最後へ複製
        const lastClone = document.createElement("img");
        lastClone.src = allImages[0];
        lastClone.className = "slide";
        slidesContainer.appendChild(lastClone);

        // =========================
        // スライダー
        // =========================

        const slides = document.querySelector(".slides");
        const slide = document.querySelectorAll(".slide");

        const prevBtn = document.querySelector(".prev");
        const nextBtn = document.querySelector(".next");

        let current = 1;

        const totalSlides = slide.length;

        slides.style.transform = `translateX(-100%)`;

        let autoSlide;

        // =========================
        // スライド更新
        // =========================

        function updateSlide() {

            slides.style.transition = "transform 0.5s ease";

            slides.style.transform =
                `translateX(-${current * 100}%)`;
        }

        // =========================
        // 自動スライド開始
        // =========================

        function startAutoSlide(){

            autoSlide = setInterval(() => {

                nextSlide(false);

            }, 4000);
        }

        // =========================
        // 自動スライドリセット
        // =========================

        function resetAutoSlide(){

            clearInterval(autoSlide);

            startAutoSlide();
        }

        // =========================
        // 次へ
        // =========================

        function nextSlide(reset = true) {

            current++;

            updateSlide();

            if(current === totalSlides - 1){

                setTimeout(() => {

                    slides.style.transition = "none";

                    current = 1;

                    slides.style.transform =
                        `translateX(-100%)`;

                }, 500);
            }

            if(reset){
                resetAutoSlide();
            }
        }

        // =========================
        // 前へ
        // =========================

        function prevSlide() {

            current--;

            updateSlide();

            if(current === 0){

                setTimeout(() => {

                    slides.style.transition = "none";

                    current = totalSlides - 2;

                    slides.style.transform =
                        `translateX(-${current * 100}%)`;

                }, 500);
            }

            resetAutoSlide();
        }

        // ボタン

        nextBtn.addEventListener("click", () => nextSlide());

        prevBtn.addEventListener("click", prevSlide);

        // 開始

        startAutoSlide();

        // =========================
        // 一覧表示
        // =========================

        const galleryBtn = document.querySelector(".gallery-btn");
        const gallery = document.querySelector(".gallery");

        let galleryOpen = false;

        galleryBtn.addEventListener("click", (e) => {

            e.preventDefault();

            galleryOpen = !galleryOpen;

            if(galleryOpen){

                gallery.style.display = "grid";

                galleryBtn.textContent = "閉じる";

            }else{

                gallery.style.display = "none";

                galleryBtn.textContent = "一覧で見る";
            }
        });

        // =========================
        // 拡大表示
        // =========================

        const lightbox = document.querySelector(".lightbox");
        const lightboxImg = document.querySelector(".lightbox-img");
        const closeBtn = document.querySelector(".close");

        const lightboxPrev = document.querySelector(".lightbox-prev");
        const lightboxNext = document.querySelector(".lightbox-next");

        let currentLightbox = 0;

        // 表示更新

        function updateLightbox(){

            lightboxImg.src = allImages[currentLightbox];
        }

        // スライダー画像クリック

        slide.forEach((img, index) => {

            if(index >= allImages.length) return;

            img.addEventListener("click", () => {

                currentLightbox = index;

                updateLightbox();

                lightbox.style.display = "flex";
            });
        });

        // 一覧画像クリック

        const galleryImgs =
            document.querySelectorAll(".gallery-img");

        galleryImgs.forEach((img, index) => {

            img.addEventListener("click", () => {

                currentLightbox = index;

                updateLightbox();

                lightbox.style.display = "flex";
            });
        });

        // 次へ

        lightboxNext.addEventListener("click", () => {

            currentLightbox++;

            if(currentLightbox >= allImages.length){

                currentLightbox = 0;
            }

            updateLightbox();
        });

        // 前へ

        lightboxPrev.addEventListener("click", () => {

            currentLightbox--;

            if(currentLightbox < 0){

                currentLightbox = allImages.length - 1;
            }

            updateLightbox();
        });

        // 閉じる

        closeBtn.addEventListener("click", () => {

            lightbox.style.display = "none";
        });

        // 背景クリック

        lightbox.addEventListener("click", (e) => {

            if(e.target === lightbox){

                lightbox.style.display = "none";
            }
        });
         // メニューバー　ハンバーガー　
        const btn = document.getElementById('hamburger-btn');
        const nav = document.getElementById('nav-menu');

        btn.addEventListener('click', () => {
            const isOpen = nav.classList.toggle('open');
            btn.classList.toggle('active', isOpen);
            btn.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
        });

        // メニュー内のリンクをタップしたら閉じる
        nav.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('open');
                btn.classList.remove('active');
            });
        });

        </script>


</body>
</html>
