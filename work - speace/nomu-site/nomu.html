<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高崎駅周辺 暇つぶしガイド</title>
    <link rel="stylesheet" href="nomu.css">
</head>
<body>

    <header>
        <div class="logo">TAKASAKI</div>
        
        <input type="checkbox" id="menu-btn">
        <label for="menu-btn" class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <nav>
            <ul>
                <li><a href="facility/facility.html">施設</a></li>
                <li><a href="cafe/cafe.html">カフェ</a></li>
                <li><a href="food/food.html">飲食店</a></li>
            </ul>
        </nav>
    </header>

    <div class="side-border">
        <div class="side-content">
            <span class="side-text">TAKASAKI GUIDE</span>
            <div class="ad-space">AD SPACE</div>
        </div>
    </div>

    <main class="main-content">
        <section class="hero" id="top">
            <div class="hero-text">
                <h1>高崎で、<br>何して遊ぶ？</h1>
                <p>高崎駅周辺のおすすめ暇つぶしスポット特集</p>
            </div>
            <div class="scroll">
                <span>SCROLL</span>
                <div class="arrow"></div>
            </div>
        </section>

        <section class="spot" id="facility">
            <img src="img/cafee.jpg" alt="人気スポット">
            <div class="spot-text">
                <h2>レジャー施設</h2>
                <p>駅直結でぶらぶらできるスポットが満載。</p>
                <a href="facility/facility.html" class="link-button">施設一覧を見る</a>
            </div>
        </section>

        <section class="spot" id="cafe">
            <img src="img/cafe.jpg" alt="絶景カフェ">
            <div class="spot-text">
                <h2>絶景カフェ</h2>
                <p>こだわりのコーヒーと落ち着く空間。</p>
                <a href="cafe/cafe.html" class="link-button">カフェ店一覧を見る</a>
            </div>
        </section>

        <section class="spot reverse" id="food">
            <img src="img/insyoku.jpg" alt="飲食店">
            <div class="spot-text">
                <h2>絶品グルメ</h2>
                <p>高崎パスタや駅弁、居酒屋まで。</p>
                <a href="food/food.html" class="link-button">飲食店一覧を見る</a>
            </div>
        </section>
    </main>

    <footer>
        <p>Takasaki Leisure Guide</p>
        <small>© 2026 All Rights Reserved.</small>
    </footer>

    <a href="#top" class="top-btn">↑</a>

</body>
</html>
