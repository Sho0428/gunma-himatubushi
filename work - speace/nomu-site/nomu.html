        <nav>

        </nav>

    <section class="hero" id="top">
        <div class="hero-text">
            <h1>高崎で、<br>何して遊ぶ？</h1>

        </div>
        <div class="scroll">

    <section class="spot" id="facility">
        <img src="img/cafee.jpg" alt="人気スポット">
        <div class="spot-text">
            <h2>レジャー施設</h2>
            <p>高崎OPAやモントレーなど、<br>駅直結でぶらぶらできるスポットが満載。</p>

        <img src="img/insyoku.jpg" alt="人気の飲食">

            <h2>どすこいラーメン</h2>
            <p>待ち合わせや、ちょっとした作業に。<br>こだわりのコーヒーと落ち着く空間をご提案。</p>

        </div>
    </section>

    <section class="spot" id="food">
        <img src="img/coffe.jpg" alt="男子おすすめカフェ">
        <div class="spot-text">
            <h2>絶景カフェ</h2>
            <p>高崎パスタや駅弁、居酒屋まで。<br>お腹も心も満たされる飲食店をチェック。</p>
            
            <a href="food.html" class="link-button">飲食店一覧を見る</a>
