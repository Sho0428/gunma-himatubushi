<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GOURMET GUIDE</title>

    <!-- CSS -->
    <link rel="stylesheet" href="facility.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- メイン画像 -->
    <section class="hero">

        <div class="overlay">

            <h1>GOURMET GUIDE</h1>

            <p>
                おしゃれで美味しい<br>
                お店を見つけよう
            </p>

        </div>

    </section>

    <!-- 店舗一覧 -->
    <section class="shops">

        <h2>POPULAR SHOPS</h2>

        <div class="shop-container">

            <!-- 店舗1 -->
            <div class="shop-card">

                <img src="images/shop1.jpg" alt="">

                <div class="shop-text">

                    <h3>CAFE TERRACE</h3>

                    <p>
                        落ち着いた空間で
                        ゆっくり過ごせる人気カフェ。
                    </p>

                </div>

            </div>

            <!-- 店舗2 -->
            <div class="shop-card">

                <img src="images/shop2.jpg" alt="">

                <div class="shop-text">

                    <h3>BURGER HOUSE</h3>

                    <p>
                        ボリューム満点の
                        ハンバーガー専門店。
                    </p>

                </div>

            </div>

            <!-- 店舗3 -->
            <div class="shop-card">

                <img src="images/shop3.jpg" alt="">

                <div class="shop-text">

                    <h3>ITALIAN KITCHEN</h3>

                    <p>
                        本格パスタが人気の
                        イタリアンレストラン。
                    </p>

                </div>

            </div>

            <!-- 店舗4 -->
            <div class="shop-card">

                <img src="images/shop4.jpg" alt="">

                <div class="shop-text">

                    <h3>JAPANESE DINING</h3>

                    <p>
                        和モダン空間で
                        本格和食を楽しめるお店。
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- フッター -->
    <footer>

        <p>© 2026 GOURMET GUIDE</p>

    </footer>

</body>
</html>
