<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Burger</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" href="coffe.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="logo">FAST BURGER</div>

        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">MENU</a></li>
                <li><a href="#">SHOP</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <!-- メイン -->
    <section class="hero">
        <div class="hero-text">
            <h1>BIG TASTE<br>BIG SMILE</h1>
            <p>
                ジューシーなバーガーと
                最高のポテトを楽しもう！
            </p>

            <button>ORDER NOW</button>
        </div>

        <div class="hero-image">
            <img src="images/burger.png" alt="ハンバーガー">
        </div>
    </section>

    <!-- メニュー -->
    <section class="menu">

        <h2>POPULAR MENU</h2>

        <div class="menu-container">

            <div class="card">
                <img src="images/burger1.jpg" alt="">
                <h3>Cheese Burger</h3>
                <p>¥850</p>
            </div>

            <div class="card">
                <img src="images/burger2.jpg" alt="">
                <h3>Double Burger</h3>
                <p>¥1200</p>
            </div>

            <div class="card">
                <img src="images/potato.jpg" alt="">
                <h3>French Fries</h3>
                <p>¥450</p>
            </div>

        </div>
    </section>

    <!-- おすすめセット -->
    <section class="special">

        <div class="special-text">
            <h2>SPECIAL SET</h2>
            <p>
                人気No.1セット！<br>
                バーガー・ポテト・ドリンク付き
            </p>

            <button>CHECK MENU</button>
        </div>

    </section>

    <!-- アクセス -->
    <section class="access">

        <h2>ACCESS</h2>

        <p>群馬県前橋市1-2-3</p>
        <p>TEL : 000-0000-0000</p>
        <p>OPEN : 10:00〜22:00</p>

    </section>

    <!-- フッター -->
    <footer>
        <p>© 2026 FAST BURGER</p>
    </footer>

</body>
</html>

<!-- テストメッセージ「こ」 -->
